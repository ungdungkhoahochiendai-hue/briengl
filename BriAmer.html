<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>British English vs. American English Presentation</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM 18 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel compiler để chạy JSX trực tiếp trên trình duyệt -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .animate-fadeInSlide { animation: fadeInSlide 0.4s ease-out forwards; }
        @keyframes fadeInSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-modalPop { animation: modalPop 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.96) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .animate-fadeInUp { animation: fadeInUp 0.4s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 font-sans antialiased overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext, useMemo } = React;

        const ModalContext = createContext(null);

        const IconVolume = ({ width = 18, height = 18, className = "" }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={width} height={height} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
        );
        const IconInfo = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>;
        const IconClose = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
        const IconVideo = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line><line x1="2" y1="7" x2="7" y2="7"></line><line x1="2" y1="17" x2="7" y2="17"></line><line x1="17" y1="17" x2="22" y2="17"></line><line x1="17" y1="7" x2="22" y2="7"></line></svg>;
        const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#16a34a" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;
        const IconX = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#dc2626" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
        const IconTable = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>;
        const IconMenu = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>;
        const IconBook = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path></svg>;

        const speak = (text, accent) => {
          if (!('speechSynthesis' in window)) {
            console.warn("Speech Synthesis is not supported in this browser.");
            return;
          }
          const cleanText = text.replace(/[\/\(\)]/g, ' ');
          window.speechSynthesis.cancel();
          const utterance = new SpeechSynthesisUtterance(cleanText);
          const voices = window.speechSynthesis.getVoices();
          
          let selectedVoice = voices.find(v => v.lang.includes(accent === 'uk' ? 'GB' : 'US') && (v.name.includes('Female') || v.name.includes('Google')));
          if (!selectedVoice) selectedVoice = voices.find(v => v.lang.includes(accent === 'uk' ? 'GB' : 'US'));
          
          if (selectedVoice) utterance.voice = selectedVoice;
          utterance.rate = 0.85; 
          window.speechSynthesis.speak(utterance);
        };

        const Modal = ({ isOpen, onClose, content }) => {
          if (!isOpen) return null;
          
          const renderTable = () => (
            <div className="w-full">
              <div className="bg-yellow-50 text-yellow-800 p-3 mb-4 rounded-lg flex items-center text-sm font-medium">
                <span className="mr-2">💡</span> You can click on any word in the table to hear its pronunciation.
              </div>
              <div className="overflow-x-auto rounded-xl border border-slate-200">
                <table className="w-full text-left text-base">
                  <thead className="bg-slate-100">
                    <tr>
                      {content.headers.map((h, i) => (
                        <th key={i} className={`p-4 font-bold ${i === 1 ? 'text-blue-700' : i === 2 ? 'text-red-700' : 'text-slate-700'}`}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-200 text-slate-700">
                    {content.rows.map((row, rowIndex) => (
                      <tr key={rowIndex} className="hover:bg-slate-50 transition-colors">
                        {row.map((cell, cellIndex) => (
                          <td 
                            key={cellIndex} 
                            className={`p-4 cursor-pointer hover:text-indigo-600 transition-colors ${cellIndex === 1 ? 'text-blue-900 font-medium' : cellIndex === 2 ? 'text-red-900 font-medium' : 'font-semibold'}`}
                            onClick={() => {
                              let accent = 'us';
                              if(cellIndex === 1) accent = 'uk';
                              else if(cellIndex === 2) accent = 'us';
                              speak(cell, accent);
                            }}
                            title="Click to listen"
                          >
                            {cell}
                          </td>
                        ))}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          );

          // Kiểm tra xem đây là link YouTube hay file video local (máy tính)
          const isYouTube = content.videoId && (content.videoId.includes('youtube.com') || content.videoId.includes('youtu.be'));

          return (
            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/80 backdrop-blur-sm transition-opacity p-4" onClick={onClose}>
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col animate-modalPop relative" onClick={e => e.stopPropagation()}>
                <div className="flex justify-between items-center p-5 border-b bg-slate-50 rounded-t-2xl">
                  <h3 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                    {content.type === 'video' ? <IconVideo /> : content.type === 'table' ? <IconTable /> : content.type === 'references' ? <IconBook /> : <IconInfo />}
                    {content.title || 'Details'}
                  </h3>
                  <button onClick={onClose} className="p-2 bg-slate-200 hover:bg-red-500 hover:text-white rounded-full transition-colors"><IconClose /></button>
                </div>
                <div className="p-6 overflow-y-auto">
                  {content.type === 'video' ? (
                    <div className="aspect-video w-full rounded-xl overflow-hidden bg-slate-900 flex items-center justify-center">
                      {isYouTube ? (
                        <iframe 
                          width="100%" 
                          height="100%" 
                          src={content.videoId?.startsWith('http') ? content.videoId : `https://www.youtube.com/embed/${content.videoId}`} 
                          title="YouTube video player" 
                          frameBorder="0" 
                          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                          allowFullScreen
                        ></iframe>
                      ) : (
                        /* Sử dụng thẻ video HTML5 cho các file offline trên máy tính */
                        <video 
                          width="100%" 
                          height="100%" 
                          controls 
                          autoPlay 
                          className="w-full h-full object-contain bg-black"
                          src={content.videoId}
                        >
                          Trình duyệt của bạn không hỗ trợ thẻ video HTML5. Hãy kiểm tra lại định dạng file (mp4/webm).
                        </video>
                      )}
                    </div>
                  ) : content.type === 'table' ? (
                    renderTable()
                  ) : content.type === 'references' ? (
                    <div className="w-full">
                      <ul className="space-y-4">
                        {content.data.map(ref => (
                          <li key={ref.id} className="bg-slate-50 p-4 rounded-xl border border-slate-200 text-sm text-slate-700 flex flex-col gap-2">
                            <div>
                               <span className="font-bold text-slate-900 mr-2">[{ref.id}]</span>
                               {ref.text}
                            </div>
                            <div className="flex justify-between items-center mt-2 border-t border-slate-200 pt-2">
                               <a href={ref.link} target="_blank" rel="noopener noreferrer" className="text-blue-600 hover:text-blue-800 font-medium flex items-center gap-1">
                                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                                  View Source
                               </a>
                               <span className="text-xs font-semibold bg-slate-200 text-slate-600 px-2 py-1 rounded-md">Cited on p. {ref.pages}</span>
                            </div>
                          </li>
                        ))}
                      </ul>
                    </div>
                  ) : (
                    <div className="space-y-6">
                      <div className="grid grid-cols-2 gap-4">
                        <div className="bg-blue-50 p-4 rounded-xl border border-blue-100 flex flex-col items-center text-center space-y-2">
                           <span className="text-sm font-bold text-blue-500 uppercase tracking-widest">British English</span>
                           <span className="text-2xl font-bold text-blue-900">{content.data?.uk}</span>
                           <button onClick={() => speak(content.data?.uk, 'uk')} className="mt-2 flex items-center text-xs font-bold bg-blue-200 hover:bg-blue-600 hover:text-white text-blue-800 px-3 py-1.5 rounded-full transition-colors"><IconVolume width={14} height={14} className="mr-1"/> Play UK</button>
                        </div>
                        <div className="bg-red-50 p-4 rounded-xl border border-red-100 flex flex-col items-center text-center space-y-2">
                           <span className="text-sm font-bold text-red-500 uppercase tracking-widest">American English</span>
                           <span className="text-2xl font-bold text-red-900">{content.data?.us}</span>
                           <button onClick={() => speak(content.data?.us, 'us')} className="mt-2 flex items-center text-xs font-bold bg-red-200 hover:bg-red-600 hover:text-white text-red-800 px-3 py-1.5 rounded-full transition-colors"><IconVolume width={14} height={14} className="mr-1"/> Play US</button>
                        </div>
                      </div>
                      {content.data?.warning && (
                        <div className="bg-yellow-50 text-yellow-800 p-4 rounded-xl border border-yellow-200 flex items-start">
                          <span className="text-2xl mr-3">⚠️</span>
                          <p className="text-sm font-medium mt-1">{content.data.warning}</p>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        };

        function VocabCard({ uk, us, img }) {
          return (
            <div className="bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 group">
              <div className="h-40 overflow-hidden relative">
                <div className="absolute inset-0 bg-slate-900/10 group-hover:bg-transparent transition-colors z-10"></div>
                <img src={img} alt={uk} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
              </div>
              <div className="p-5 flex flex-col justify-between space-y-3">
                <div className="flex justify-between items-center border-b border-slate-100 pb-2">
                  <button onClick={() => speak(uk, 'uk')} className="flex items-center text-xs font-bold bg-blue-100 hover:bg-blue-600 hover:text-white text-blue-800 px-3 py-1 rounded-full uppercase tracking-wide cursor-pointer transition-colors" title="Listen UK">
                    <IconVolume width={14} height={14} className="mr-1"/> UK
                  </button>
                  <span className="font-bold text-slate-800 text-lg">{uk}</span>
                </div>
                <div className="flex justify-between items-center">
                  <button onClick={() => speak(us, 'us')} className="flex items-center text-xs font-bold bg-red-100 hover:bg-red-600 hover:text-white text-red-800 px-3 py-1 rounded-full uppercase tracking-wide cursor-pointer transition-colors" title="Listen US">
                    <IconVolume width={14} height={14} className="mr-1"/> US
                  </button>
                  <span className="font-bold text-slate-800 text-lg">{us}</span>
                </div>
              </div>
            </div>
          );
        }

        function InteractiveButton({ type, word, title, data, videoId, className = "" }) {
          const openModal = useContext(ModalContext);

          if (type === 'audio') {
            return (
              <div className={`flex items-center justify-between bg-white p-4 rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow ${className}`}>
                <span className="font-bold text-slate-800 text-xl tracking-wide">"{word}"</span>
                <div className="flex space-x-2">
                  <button onClick={() => speak(word, 'uk')} className="flex items-center text-sm font-semibold bg-blue-50 hover:bg-blue-600 hover:text-white text-blue-700 px-4 py-2 rounded-lg transition-colors duration-200">
                    <IconVolume /> <span className="ml-2">UK</span>
                  </button>
                  <button onClick={() => speak(word, 'us')} className="flex items-center text-sm font-semibold bg-red-50 hover:bg-red-600 hover:text-white text-red-700 px-4 py-2 rounded-lg transition-colors duration-200">
                    <IconVolume /> <span className="ml-2">US</span>
                  </button>
                </div>
              </div>
            );
          }

          if (type === 'modal') {
            return (
              <button
                onClick={() => {
                  speak(title, 'us'); 
                  openModal({ type: 'info', title, data });
                }}
                className={`bg-white p-6 rounded-2xl border-2 border-slate-200 shadow-sm hover:border-indigo-500 hover:shadow-lg transition-all transform hover:-translate-y-1 flex flex-col items-center justify-center space-y-3 cursor-pointer group ${className}`}
              >
                <span className="text-3xl group-hover:scale-110 transition-transform">🔍</span>
                <span className="font-bold text-slate-800 text-xl">{title}</span>
                <span className="text-sm text-indigo-600 font-medium opacity-0 group-hover:opacity-100 transition-opacity">Click to reveal</span>
              </button>
            );
          }

          if (type === 'video') {
            return (
              <button
                onClick={() => openModal({ type: 'video', title, videoId })}
                className={`flex items-center justify-center space-x-3 bg-red-600 hover:bg-red-700 text-white px-8 py-4 rounded-full font-bold text-lg shadow-lg hover:shadow-red-500/50 transition-all transform hover:-translate-y-1 ${className}`}
              >
                <IconVideo /> <span>{title}</span>
              </button>
            );
          }

          return null;
        }

        function TableButton({ title, headers, rows }) {
          const openModal = useContext(ModalContext);
          return (
            <button
              onClick={() => openModal({ type: 'table', title, headers, rows })}
              className="bg-white border border-slate-200 p-5 rounded-2xl shadow-sm hover:shadow-md hover:border-blue-400 flex flex-col items-start justify-center transition-all group w-full text-left"
            >
              <div className="bg-blue-50 text-blue-600 w-12 h-12 rounded-xl flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
                <IconTable />
              </div>
              <h3 className="font-bold text-slate-800 text-lg">{title}</h3>
              <span className="text-xs text-slate-400 mt-1 uppercase tracking-widest font-semibold group-hover:text-blue-500">View Data</span>
            </button>
          );
        }

        const referencesList = [
          { id: 1, text: "Algeo, J. (2006). British or American English? A Handbook of Word and Grammar Patterns. Cambridge University Press.", link: "https://www.cambridge.org/core_title/gb/122734", pages: "8–13" },
          { id: 2, text: "Baugh, A. C., & Cable, T. (2013). A History of the English Language (6th ed.). Routledge.", link: "https://www.routledge.com/A-History-of-the-English-Language/Baugh-Cable/p/book/9780415655958", pages: "4" },
          { id: 3, text: "Crystal, D. (2003). English as a Global Language (2nd ed.). Cambridge University Press.", link: "https://www.cambridge.org/core/books/english-as-a-global-language/55FF02AE5915539906778C02F0F5195E", pages: "3" },
          { id: 4, text: "Crystal, D. (2019). The Cambridge Encyclopedia of the English Language (3rd ed.). Cambridge University Press.", link: "https://www.cambridge.org/highereducation/books/the-cambridge-encyclopedia-of-the-english-language/2B10AC8766B73D09955C899572C1E7EC", pages: "4, 6" },
          { id: 5, text: "Davies, C. (2005). Divided by a Common Language: A Guide to British and American English. Houghton Mifflin.", link: "https://books.google.com/books/about/Divided_by_a_Common_Language.html?id=13SyhqA6R28C", pages: "8–12, 14" },
          { id: 6, text: "Kachru, B. B. (1985). Standards, codification and sociolinguistic realism: The English language in the outer circle. In R. Quirk & H. G. Widdowson (Eds.), English in the World. Cambridge University Press.", link: "https://scholar.google.com/scholar?q=Kachru+Standards+codification+sociolinguistic+realism+outer+circle", pages: "6" },
          { id: 7, text: "Tottie, G. (2002). An Introduction to American English. Blackwell.", link: "https://blackwells.co.uk/bookshop/product/An-Introduction-To-American-English-by-Gunnel-Tottie/9780631197928", pages: "7" },
          { id: 8, text: "Trudgill, P., & Hannah, J. (2017). International English: A Guide to Varieties of English (6th ed.). Routledge.", link: "https://www.routledge.com/International-English-A-Guide-to-Varieties-of-English-Around-the-World/Trudgill-Hannah/p/book/9781138233690", pages: "6, 14" },
          { id: 9, text: "Wells, J. C. (1982). Accents of English (Vols. 1–3). Cambridge University Press.", link: "https://www.cambridge.org/core/books/accents-of-english/A9495FCF7CC13D1D11FADB3DE2F335F6", pages: "8–9" }
        ];

        function PresentationApp() {
          const [currentSlide, setCurrentSlide] = useState(0);
          const [modalState, setModalState] = useState({ isOpen: false, content: {} });
          const [quizStates, setQuizStates] = useState({});
          const [sidebarOpen, setSidebarOpen] = useState(true);

          const openModal = (content) => setModalState({ isOpen: true, content });
          const closeModal = () => setModalState({ isOpen: false, content: {} });

          useEffect(() => {
            if ('speechSynthesis' in window) {
              window.speechSynthesis.getVoices();
              window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
            }
          }, []);

          const dataTable2 = [
            { word: 'schedule', uk: "/ˈʃedju:l/", us: "/ˈskedʒu:l/" },
            { word: 'tomato', uk: "/təˈmɑ:təʊ/", us: "/təˈmeɪtoʊ/" },
            { word: 'vitamin', uk: "/ˈvɪtəmɪn/", us: "/ˈvaɪtəmɪn/" },
            { word: 'herb', uk: "/hɜ:b/", us: "/ɜ:b/ (or /ɜ:rb/)" },
            { word: 'either', uk: "/ˈaɪðə(r)/ (also /ˈi:ðə(r)/)", us: "/ˈi:ðər/ (also /aɪðər/)" },
            { word: 'neither', uk: "/ˈnaɪðə(r)/ (also /ni:ðə(r)/)", us: "/ˈni:ðər/ (also /naɪðər/)" },
            { word: 'leisure', uk: "/ˈleʒə(r)/", us: "/ˈli:ʒər/" },
            { word: 'privacy', uk: "/ˈprɪvəsi/", us: "/ˈpraɪvəsi/" },
            { word: 'garage', uk: "/ˈɡærɑ:ʒ/ (or /ɡærɪdʒ/)", us: "/ɡəˈrɑ:ʒ/" },
            { word: 'mobile', uk: "/ˈməʊbaɪl/", us: "/ˈmoʊbəl/" }
          ];

          const presentationData = useMemo(() => [
            {
              id: 1, type: 'cover', title: 'British English vs. American English', subtitle: 'A Comparative Study of Pronunciation, Vocabulary, Grammar, and Usage', authors: ['Thai Minh Tam', 'Tran Minh Tan', 'Nguyen Thi Thanh Thuy'], classInfo: 'DTNN.TX.T101', instructor: 'Nguyen Thi Xuan Hong', date: '03/07/2026'
            },
            {
              id: 2, type: 'content', title: 'General Information', content: (
                <div className="space-y-6 text-lg text-slate-700 leading-relaxed">
                  <p>English is today the most widely used language in the world and the closest thing humanity has to a truly global means of communication.</p>
                  <div className="grid grid-cols-3 gap-6">
                    <div className="bg-slate-50 p-6 rounded-xl border border-slate-200 flex flex-col items-center text-center"><span className="text-4xl mb-3">🌍</span><h4 className="font-bold text-slate-800 mb-2">Native Speakers</h4><p className="text-3xl font-black text-blue-600 mb-2">~400M</p><p className="text-sm">People use it as their mother tongue.</p></div>
                    <div className="bg-slate-50 p-6 rounded-xl border border-slate-200 flex flex-col items-center text-center"><span className="text-4xl mb-3">🗣️</span><h4 className="font-bold text-slate-800 mb-2">Second Language</h4><p className="text-3xl font-black text-red-600 mb-2">&gt; 1 Billion</p><p className="text-sm">Foreign or second language.</p></div>
                    <div className="bg-slate-50 p-6 rounded-xl border border-slate-200 flex flex-col items-center text-center"><span className="text-4xl mb-3">💼</span><h4 className="font-bold text-slate-800 mb-2">Lingua Franca</h4><p className="text-xl font-bold text-slate-700 mb-2">Global Standard</p><p className="text-sm">Business, science, internet.</p></div>
                  </div>
                  <p className="bg-blue-50 p-4 rounded-lg mt-4 text-center italic text-blue-900 font-medium">British English and American English are the two most influential and widely used standards worldwide.</p>
                </div>
              )
            },
            {
              id: 3, type: 'content', title: 'A Brief History of English', content: (
                <div className="space-y-6 text-lg text-slate-700 leading-relaxed h-full flex flex-col justify-center">
                  <p>English belongs to the Germanic branch of the Indo-European language family. Its development is divided into four main periods:</p>
                  <div className="grid grid-cols-4 gap-4">
                    <div className="bg-slate-50 p-4 rounded-xl border-t-4 border-slate-300 shadow-sm"><span className="text-xs font-bold text-slate-400 block mb-1">5th Century AD</span><h4 className="font-bold text-slate-800 mb-2">Old English</h4><p className="text-sm">Brought by Germanic tribes. Highly inflected (e.g., Beowulf).</p></div>
                    <div className="bg-slate-50 p-4 rounded-xl border-t-4 border-blue-400 shadow-sm"><span className="text-xs font-bold text-slate-400 block mb-1">11th Century</span><h4 className="font-bold text-slate-800 mb-2">Middle English</h4><p className="text-sm">Post-1066 Norman Conquest. French/Latin influence.</p></div>
                    <div className="bg-slate-50 p-4 rounded-xl border-t-4 border-indigo-400 shadow-sm"><span className="text-xs font-bold text-slate-400 block mb-1">1500 - 1700</span><h4 className="font-bold text-slate-800 mb-2">Early Modern</h4><p className="text-sm">Great Vowel Shift, printing press, Shakespeare.</p></div>
                    <div className="bg-slate-50 p-4 rounded-xl border-t-4 border-red-400 shadow-sm"><span className="text-xs font-bold text-slate-400 block mb-1">1700 - Present</span><h4 className="font-bold text-slate-800 mb-2">Modern English</h4><p className="text-sm">Global spread. Divergence of British and American varieties.</p></div>
                  </div>
                </div>
              )
            },
            {
              id: 4, type: 'content', title: 'The Divergence', content: (
                <div className="space-y-6 text-lg text-slate-700 leading-relaxed">
                  <p>The separation began in the early 17th century with settlements in North America. Two main processes explain their differences:</p>
                  <div className="grid grid-cols-2 gap-8 mt-4">
                    <div className="bg-slate-50 p-6 rounded-2xl border border-slate-200">
                      <h3 className="font-bold text-2xl text-slate-800 mb-3 text-blue-800">1. Colonial Lag</h3>
                      <p className="mb-4 text-base">Colonies tend to preserve older features of a language that subsequently change in the homeland.</p>
                      <ul className="list-disc pl-5 text-sm space-y-2"><li><strong>Rhoticity:</strong> Americans kept the 17th-century 'r' sound.</li><li><strong>Vocabulary:</strong> US kept older words like <em>fall</em> and <em>gotten</em>.</li></ul>
                    </div>
                    <div className="bg-slate-50 p-6 rounded-2xl border border-slate-200">
                      <h3 className="font-bold text-2xl text-slate-800 mb-3 text-red-800">2. Independent Innovation</h3>
                      <p className="mb-4 text-base">Settlers encountered an unfamiliar continent and borrowed freely to describe new landscapes.</p>
                      <ul className="list-disc pl-5 text-sm space-y-2"><li><strong>Borrowings:</strong> Spanish (<em>canyon</em>), Dutch (<em>cookie</em>).</li><li><strong>Webster's Reforms:</strong> Noah Webster simplified US spelling in 1828 (<em>color</em> vs <em>colour</em>).</li></ul>

                  </div>
                </div>
              )

                     <div className="bg-red-50 p-6 rounded-xl border border-red-100"><h4 className="font-bold text-red-900 mb-2">2. The Rise of the US</h4><p className="text-sm text-red-800">Post-WWII, the US became a dominant power. American English spread via global media, technology, and the internet.</p></div>
                  </div>
                  <div className="bg-slate-50 p-6 rounded-xl border border-slate-200 text-center">

                      <div className="bg-white p-3 rounded-lg shadow-sm border border-slate-200"><span className="font-bold">Expanding:</span> Vietnam, China</div>
                    </div>
                  </div>
                </div>

                    </div>
                    <div className="bg-slate-50 p-5 rounded-2xl border border-slate-200">

                      {/* Hãy thay video2.mp4 bằng đường dẫn tương đối tới file thứ 2 trong thư mục của bạn */}
                      <InteractiveButton type="video" videoId="../BriAmer/2222.mp4" title="Take the Test" className="w-full text-sm py-3 bg-red-600 hover:bg-red-700 hover:shadow-red-500/50" />
                    </div>

                    <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow flex flex-col items-center text-center">
                      <div className="w-16 h-16 bg-purple-100 text-purple-600 rounded-full flex items-center justify-center mb-4">
                        <span className="text-2xl">🎬</span>
                      </div>
                      <h4 className="font-bold text-lg text-slate-800 mb-2">Pop Culture Clash</h4>
                      <p className="text-sm text-slate-500 mb-6 flex-grow">See how British and American actors struggle with each other's slang in interviews.</p>
                      {/* Hãy thay video3.mp4 bằng đường dẫn tương đối tới file thứ 3 trong thư mục của bạn */}
                      <InteractiveButton type="video" videoId="../BriAmer/3333.mp4" title="Watch Interviews" className="w-full text-sm py-3 bg-purple-600 hover:bg-purple-700 hover:shadow-purple-500/50" />
					  

                    </div>
                  </div>
                </div>
              )
            },
            {
              id: 17, type: 'cover', title: 'Thank You!', subtitle: 'Both varieties are correct and mutually intelligible. Choose one and be consistent!', authors: ['Q&A Session'], classInfo: '', instructor: ''
            }
          ], []);

          const totalSlides = presentationData.length;
          const slide = presentationData[currentSlide];

          const nextSlide = () => setCurrentSlide(prev => Math.min(prev + 1, totalSlides - 1));
          const prevSlide = () => setCurrentSlide(prev => Math.max(prev - 1, 0));

          const renderSlideContent = () => {
            if (slide.type === 'cover') {
              return (
                <div className="flex flex-col items-center justify-center h-full text-center px-12 bg-slate-50">
                  <div className="bg-white p-10 rounded-3xl shadow-sm border border-slate-200 max-w-4xl w-full">
                    <h1 className="text-5xl font-extrabold text-slate-800 mb-6 leading-tight">{slide.title}</h1>
                    <h2 className="text-2xl text-slate-600 font-medium mb-12">{slide.subtitle}</h2>
                    {slide.authors[0] !== 'Q&A Session' ? (
                      <div className="grid grid-cols-2 gap-8 text-left bg-slate-50 p-8 rounded-2xl border border-slate-100">
                        <div>
                          <p className="text-slate-400 text-sm uppercase tracking-widest font-bold mb-2">Prepared by</p>
                          <ul className="text-lg font-semibold text-slate-700 space-y-1">
                            {slide.authors.map((author, i) => <li key={i}>{i+1}. {author}</li>)}
                          </ul>
                        </div>
                        <div>
                           <p className="text-slate-400 text-sm uppercase tracking-widest font-bold mb-1">Class</p>
                           <p className="text-lg font-semibold text-slate-700">{slide.classInfo}</p>
                           <p className="text-slate-400 text-sm uppercase tracking-widest font-bold mb-1 mt-4">Instructor</p>
                           <p className="text-lg font-semibold text-slate-700">{slide.instructor}</p>
                        </div>
                      </div>
                    ) : (
                      <div className="flex flex-col items-center justify-center space-y-5">
                        <a 
                          href="https://wayground.com/activity/admin/quiz/6a51719ef827c3acac0f3511" 
                          target="_blank" 
                          rel="noopener noreferrer" 
                          className="inline-block bg-slate-800 hover:bg-slate-700 text-white px-10 py-4 rounded-full text-2xl font-bold transition-colors shadow-lg hover:shadow-xl transform hover:-translate-y-1 cursor-pointer"
                        >
                          Q&A Session
                        </a>
                        <button 
                          onClick={() => openModal({ type: 'references', title: 'References', data: referencesList })}
                          className="inline-flex items-center gap-2 bg-white text-slate-700 border-2 border-slate-200 hover:border-slate-400 hover:bg-slate-50 px-8 py-3 rounded-full text-lg font-bold transition-all shadow-sm hover:shadow-md cursor-pointer"
                        >
                          <IconBook /> View References
                        </button>
                      </div>
                    )}
                  </div>
                </div>
              );
            }

            return (
              <div className="h-full flex flex-col p-10 bg-white">
                <h2 className="text-4xl font-extrabold text-slate-800 mb-8 pb-4 border-b border-slate-200">{slide.title}</h2>
                <div className="flex-grow flex flex-col relative text-slate-700">{slide.content}</div>
              </div>
            );
          };

          return (
            <ModalContext.Provider value={openModal}>
              <div className="h-screen w-full bg-slate-100 flex flex-col md:flex-row font-sans overflow-hidden">
                
                <div className={`${sidebarOpen ? 'w-80' : 'w-0'} transition-all duration-300 bg-white border-r border-slate-200 flex flex-col h-full flex-shrink-0 overflow-hidden`}>
                  <div className="p-6 border-b border-slate-100 flex items-center space-x-3 bg-slate-50">
                     <div className="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center text-white font-bold text-xl">E</div>
                     <h1 className="font-bold text-slate-800 text-base leading-tight">Presentation<br/><span className="text-slate-500 text-xs font-normal">Interactive App</span></h1>
                  </div>
                  <div className="flex-1 overflow-y-auto p-4 space-y-1 custom-scrollbar">
                    <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 px-2">Table of Contents</div>
                    {presentationData.map((s, i) => (
                      <button
                        key={s.id} onClick={() => setCurrentSlide(i)}
                        className={`w-full text-left px-4 py-3 rounded-xl transition-all flex items-center group ${currentSlide === i ? 'bg-blue-50 text-blue-700 font-semibold border border-blue-100' : 'text-slate-600 hover:bg-slate-50'}`}
                      >
                        <span className={`mr-3 ${currentSlide === i ? 'text-blue-600' : 'text-slate-400'}`}>
                          {s.type === 'video' ? <IconVideo /> : s.type === 'cover' ? <IconInfo /> : s.type === 'quiz' ? <IconCheck /> : s.type === 'interactive' ? <IconTable /> : <IconInfo />}
                        </span>
                        <span className="text-sm truncate w-full">{s.title}</span>
                      </button>
                    ))}
                  </div>
                </div>

                <div className="flex-1 flex flex-col h-full relative">
                  
                  <div className="h-14 bg-white border-b border-slate-200 flex items-center px-4 justify-between shrink-0">
                    <button onClick={() => setSidebarOpen(!sidebarOpen)} className="p-2 text-slate-500 hover:bg-slate-100 rounded-lg">
                      <IconMenu />
                    </button>
                    <span className="font-semibold text-slate-600 text-sm">Slide {currentSlide + 1} of {totalSlides}</span>
                  </div>

                  <div className="flex-1 bg-slate-100 p-4 md:p-8 flex items-center justify-center overflow-hidden">
                     <div className="w-full max-w-[1100px] aspect-[16/9] bg-white rounded-2xl shadow-xl overflow-hidden relative ring-1 ring-slate-900/5">
                        <div key={currentSlide} className="absolute inset-0 animate-fadeInSlide">
                          {renderSlideContent()}
                        </div>
                     </div>
                  </div>

                  <div className="bg-white border-t border-slate-200 px-6 py-4 flex justify-between shrink-0">
                     <button onClick={prevSlide} disabled={currentSlide === 0} className={`px-6 py-2 rounded-lg font-semibold transition-all ${currentSlide === 0 ? 'bg-slate-50 text-slate-300' : 'bg-slate-100 text-slate-700 hover:bg-slate-200'}`}>Previous</button>
                     <button onClick={nextSlide} disabled={currentSlide === totalSlides - 1} className={`px-8 py-2 rounded-lg font-semibold transition-all ${currentSlide === totalSlides - 1 ? 'bg-slate-50 text-slate-300' : 'bg-blue-600 text-white hover:bg-blue-700 shadow-md'}`}>Next Slide</button>
                  </div>
                  
                  <div className="h-1 bg-slate-200 w-full"><div className="h-full bg-blue-600 transition-all duration-500" style={{ width: `${((currentSlide + 1) / totalSlides) * 100}%` }}></div></div>
                </div>
              </div>

              <Modal isOpen={modalState.isOpen} onClose={closeModal} content={modalState.content} />
            </ModalContext.Provider>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PresentationApp />);
    </script>
</body>
</html>
